spring:
  application:
    name: trans-trader

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    database: 1

  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 10

server:
  port: 8080

# OKEx API 配置
okex:
  api:
    key: your-api-key
    secret: your-api-secret
    passphrase: your-api-passphrase
    base-url: https://www.okex.com
